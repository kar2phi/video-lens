version: '3'

vars:
  REPORTS_DIR: '{{.REPORTS_DIR | default "~/Downloads/video-lens"}}'

tasks:
  build-index:
    desc: "Build manifest.json and copy index.html into the reports directory"
    cmds:
      - python3 skills/video-lens-gallery/scripts/build_index.py --dir {{.REPORTS_DIR}}

  backfill-meta:
    desc: "Inject video-lens-meta blocks into existing reports that lack them"
    cmds:
      - python3 skills/video-lens-gallery/scripts/backfill_meta.py --dir {{.REPORTS_DIR}}

  install-libraries:
    desc: Install Python dependencies
    cmd: pip install -r requirements.txt

  test:
    desc: Run fast integration tests (no LLM invocation)
    cmd: pytest tests/test_e2e.py -v -m "not slow"

  test-full:
    desc: Run all tests including real Claude session (slow, requires API key)
    cmd: pytest tests/test_e2e.py -v

  dev:
    desc: Run template dev server with sample content
    cmds:
      - python3 scripts/yt_template_dev.py
      - bash skills/video-lens/scripts/serve_report.sh ~/Downloads/video-lens/reports/video-lens_sample_output.html

  install-raycast:
    desc: "Copy scripts/raycast-video-lens.sh to ~/.raycast/scripts/ (AGENT=claude|gemini|codex|cursor|opencode|copilot)"
    vars:
      AGENT: '{{.AGENT | default "claude"}}'
    cmds:
      - |
        python3 - << 'PYEOF'
        import os, sys
        agent = "{{.AGENT}}"
        # Use chr(92) for backslash to avoid YAML/shell escaping issues.
        # Each \" pair in the AppleScript string cmd requires a literal backslash.
        Q = chr(92) + '"'
        # Per-agent: (skip-permissions flag, allowed-tools flag, prompt flag)
        # prompt flag: prepended before the quoted prompt argument
        # claude/gemini/codex/opencode take the prompt as a positional argument
        # copilot/cursor require -p before the prompt
        FLAGS = {
            "claude":   ("--dangerously-skip-permissions", "--allowedTools " + Q + "Bash,Read" + Q, ""),
            "gemini":   ("--yolo",                         "--allowed-tools " + Q + "read_file,run_shell_command" + Q, ""),
            "codex":    ("-a never",                       "",                                                          ""),
            "cursor":   ("--force",                        "",                                                          "-p"),
            "opencode": ("",                               "",                                                          ""),
            "copilot":  ("--allow-all-tools",              "",                                                          "-p"),
        }
        if agent == "windsurf":
            sys.exit("Error: windsurf has no headless CLI — install-raycast is not supported for windsurf")
        if agent not in FLAGS:
            sys.exit("Unknown agent '{}'. Valid: {}".format(agent, ", ".join(FLAGS)))
        skip_perm, tools, prompt_flag = FLAGS[agent]
        src = open("scripts/raycast-video-lens.sh").read()
        src = src.replace("opens Claude in iTerm2", "opens {} in iTerm2".format(agent.capitalize()))
        src = src.replace("&& claude ", "&& {} ".format(agent))
        if skip_perm:
            src = src.replace("--dangerously-skip-permissions ", "{} ".format(skip_perm))
        else:
            src = src.replace("--dangerously-skip-permissions ", "")
        old_tools = "--allowedTools " + Q + "Bash,Read" + Q
        if tools:
            src = src.replace(old_tools, tools)
        else:
            src = src.replace(" " + old_tools, "")
        if prompt_flag:
            # Insert prompt flag before the quoted skill invocation: \" → -p \"
            old_prompt_prefix = ' ' + chr(92) + '"/video-lens '
            new_prompt_prefix = ' ' + prompt_flag + ' ' + chr(92) + '"/video-lens '
            src = src.replace(old_prompt_prefix, new_prompt_prefix)
        if agent != "claude":
            # copilot uses Claude model IDs but with dot notation (4.6 not 4-6).
            # Others get short-name pass-through (user types the model name directly).
            MODEL_MAPS = {
                "gemini":   None,
                "codex":    None,
                "cursor":   None,
                "opencode": None,
                "copilot":  ("claude-haiku-4.5", "claude-sonnet-4.6", "claude-opus-4.6"),
            }
            model_map = MODEL_MAPS[agent]
            if model_map:
                haiku_id, sonnet_id, opus_id = model_map
                src = src.replace("claude-haiku-4-5-20251001", haiku_id)
                src = src.replace("claude-sonnet-4-6", sonnet_id)
                src = src.replace("claude-opus-4-6", opus_id)
            else:
                src = src.replace("claude-haiku-4-5-20251001", "haiku")
                src = src.replace("claude-sonnet-4-6", "sonnet")
                src = src.replace("claude-opus-4-6", "opus")
        dest = os.path.expanduser("~/.raycast/scripts/video-lens.sh")
        os.makedirs(os.path.dirname(dest), exist_ok=True)
        open(dest, "w").write(src)
        print("Installed video-lens raycast script for {} → {}".format(agent, dest))
        PYEOF
      - chmod +x ~/.raycast/scripts/video-lens.sh

  install-skill:
    desc: Install skill for all detected agents via npx skills CLI
    cmd: npx skills add kar2phi/video-lens

  install-skill-local:
    desc: "Sync skill files from repo to a local agent skill dir (AGENT=claude|agents|gemini|opencode|cursor)"
    vars:
      AGENT: '{{.AGENT}}'
    cmds:
      - |
        agent="{{.AGENT}}"
        case "$agent" in
          agents)   dir="$HOME/.agents/skills" ;;  # generic ~/.agents layout used by some AI IDEs
          claude)   dir="$HOME/.claude/skills" ;;
          gemini)   dir="$HOME/.gemini/skills" ;;
          opencode) dir="$HOME/.opencode/skills" ;;
          cursor)   dir="$HOME/.cursor/skills" ;;
          "") echo "Error: AGENT is required. Usage: task install-skill-local AGENT=claude" && exit 1 ;;
          *) echo "Error: Unknown agent '$agent'. Valid: claude, agents, gemini, opencode, cursor" && exit 1 ;;
        esac
        mkdir -p "$dir/video-lens"
        cp skills/video-lens/SKILL.md "$dir/video-lens/SKILL.md"
        cp skills/video-lens/template.html "$dir/video-lens/template.html"
        rsync -a --delete --exclude='__pycache__' skills/video-lens/scripts/ "$dir/video-lens/scripts/"
        echo "Synced skills/video-lens/ → $dir/video-lens/"
        mkdir -p "$dir/video-lens-gallery"
        cp skills/video-lens-gallery/SKILL.md "$dir/video-lens-gallery/SKILL.md"
        cp skills/video-lens-gallery/index.html "$dir/video-lens-gallery/index.html"
        rsync -a --delete --exclude='__pycache__' skills/video-lens-gallery/scripts/ "$dir/video-lens-gallery/scripts/"
        echo "Synced skills/video-lens-gallery/ → $dir/video-lens-gallery/"
